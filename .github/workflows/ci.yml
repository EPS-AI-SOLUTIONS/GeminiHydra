name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

# Cancel in-progress runs for the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Frontend: Biome lint (fast, no workspace deps needed)
  # TypeScript type-checking is skipped in CI because tsc requires
  # the @jaskier/ui workspace package, which lives in the parent monorepo
  # and cannot be installed in a standalone app checkout.
  # tsc is enforced locally via the post-commit hook.
  # ────────────────────────────────────────────────────────────────────────────
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: biomejs/setup-biome@v2
        with:
          version: latest

      - name: Biome lint
        run: biome check --diagnostic-level=error src/

      # TypeScript check is intentionally skipped — requires @jaskier/ui from
      # the parent monorepo. Run locally with: bun typecheck
      # - name: Type check (skipped — requires monorepo workspace)
      #   run: bun typecheck

  # ────────────────────────────────────────────────────────────────────────────
  # Backend: Rust checks with shared crate setup
  #
  # GeminiHydra's backend Cargo.toml references shared crates via relative paths:
  #   jaskier-core = { path = "../../../crates/jaskier-core" }
  #
  # In GitHub Actions, the repo is checked out at:
  #   /home/runner/work/GeminiHydra/GeminiHydra/
  # So ../../../crates resolves to:
  #   /home/runner/work/crates/
  #
  # We reconstruct this structure by sparse-cloning the JaskierWorkspace
  # monorepo's crates/ directory into the expected location.
  # ────────────────────────────────────────────────────────────────────────────
  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    env:
      # Sparse-clone source for shared crates.
      # Override via repo secret CRATES_SOURCE_REPO if the monorepo is private.
      CRATES_SOURCE_REPO: https://x-access-token:${{ secrets.GH_PAT }}@github.com/EPS-AI-SOLUTIONS/JaskierWorkspace.git
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      # ── Workspace crate setup ───────────────────────────────────────────────
      # Sparse-clone the shared `crates/` directory from the monorepo into
      # the directory that Cargo expects based on relative path resolution.
      #
      # Cargo.toml path: ../../../crates/<crate>
      # From backend/: .. → GeminiHydra/  ../ → work/GeminiHydra/  ../../.. → work/
      # So we clone crates/ into: /home/runner/work/crates/
      - name: Set up shared workspace crates
        run: |
          PARENT_DIR="$(dirname "$GITHUB_WORKSPACE")"
          CRATES_TARGET="$PARENT_DIR/crates"

          echo "App checkout   : $GITHUB_WORKSPACE"
          echo "Crates target  : $CRATES_TARGET"
          echo "Crates source  : $CRATES_SOURCE_REPO"

          if [ -d "$CRATES_TARGET/jaskier-core" ]; then
            echo "✓ Crates already present — skipping"
            exit 0
          fi

          git clone \
            --filter=blob:none \
            --no-checkout \
            --depth=1 \
            --branch master \
            "$CRATES_SOURCE_REPO" \
            "$PARENT_DIR/_ws_tmp"

          cd "$PARENT_DIR/_ws_tmp"
          git sparse-checkout init --cone
          git sparse-checkout set crates
          git checkout

          mv "$PARENT_DIR/_ws_tmp/crates" "$CRATES_TARGET"
          rm -rf "$PARENT_DIR/_ws_tmp"

          # Workspace Cargo.toml stub so `{ workspace = true }` deps resolve.
          # The stub only needs to declare workspace.dependencies matching
          # the full monorepo Cargo.toml — it does NOT need to list all members.
          if [ ! -f "$PARENT_DIR/Cargo.toml" ]; then
            cat > "$PARENT_DIR/Cargo.toml" << 'CARGO_TOML'
          [workspace]
          resolver = "2"
          members = ["crates/*", "GeminiHydra/backend"]

          [workspace.dependencies]
          # Axum / Tower stack
          axum            = "0.8"
          axum-extra      = { version = "0.10", features = ["typed-header"] }
          tokio           = { version = "1", features = ["full"] }
          tower           = { version = "0.5", features = ["util"] }
          tower-http      = { version = "0.6", features = ["cors", "compression-gzip", "trace", "fs", "limit", "set-header"] }
          tower_governor  = "0.8"

          # Serialization
          serde           = { version = "1.0", default-features = false, features = ["std", "derive"] }
          serde_json      = "1.0"

          # Database
          sqlx            = { version = "0.8", default-features = false, features = ["runtime-tokio", "tls-native-tls", "postgres", "chrono", "uuid", "migrate", "macros", "json"] }

          # Logging / Tracing
          tracing         = "0.1"
          tracing-subscriber = { version = "0.3", features = ["env-filter", "json", "registry"] }

          # HTTP client
          reqwest         = { version = "0.13", default-features = false, features = ["rustls", "json", "multipart", "query", "stream", "form", "gzip"] }

          # Utilities
          chrono          = { version = "0.4", default-features = false, features = ["clock", "std", "serde"] }
          uuid            = { version = "1", default-features = false, features = ["v4", "serde"] }
          anyhow          = "1.0"
          thiserror       = "2.0"
          dotenvy         = "0.15"
          sysinfo         = "=0.38.4"
          subtle          = "2"

          # Async / streaming
          futures-util    = "0.3"
          tokio-stream    = { version = "0.1", features = ["sync"] }
          tokio-util      = "0.7"
          async-stream    = "0.3"

          # Crypto / encoding
          sha2            = { version = "0.10", default-features = false, features = ["std"] }
          base64          = "0.22"
          rand            = "0.9"
          aes-gcm         = "0.10"
          hex             = "0.4"

          # Web / parsing
          url             = { version = "2", default-features = false }
          http            = "1"
          http-body-util  = "0.1"
          glob            = "0.3"
          dirs            = "6"
          regex           = "1"
          scraper         = "0.25"
          ego-tree        = "0.11"

          # OpenAPI / docs
          utoipa          = { version = "5", features = ["axum_extras", "uuid", "chrono"] }
          utoipa-swagger-ui = { version = "9", features = ["axum"] }

          # Code analysis (tree-sitter)
          streaming-iterator     = "0.1"
          tree-sitter            = "0.26"
          tree-sitter-rust       = "0.24"
          tree-sitter-typescript = "0.23"
          tree-sitter-javascript = "0.25"
          tree-sitter-python     = "0.25"
          tree-sitter-go         = "0.25"

          # PDF / archive
          pdf-extract     = "0.10"
          zip             = { version = "2", default-features = false, features = ["deflate"] }

          # Auth / security extras
          jsonwebtoken    = { version = "10.3.0", features = ["rust_crypto"] }
          rusqlite        = { version = "0.32", features = ["bundled"] }

          # Caching
          moka            = { version = "0.12", default-features = false, features = ["future"] }

          # Observability
          sentry          = { version = "0.35", default-features = false, features = ["backtrace", "contexts", "panic", "reqwest", "rustls"] }
          sentry-tracing  = "0.35"

          # Desktop / native (cfg-gated)
          rfd             = "0.15"
          tauri-winrt-notification = "0.7"
          winrt-toast-reborn = "0.3"
          win32_notif     = "0.15"
          windows         = { version = "0.62", features = ["Win32_Security_Cryptography", "Win32_Foundation", "Win32_System_Memory", "Win32_System_Threading", "Win32_System_Console", "Win32_UI_WindowsAndMessaging", "Win32_UI_Shell", "Win32_System_Com", "Win32_Storage_FileSystem"] }
          windows-sys     = "0.62"

          # Async extras
          async-trait     = "0.1"
          futures         = "0.3"

          # Browser automation (CDP)
          chromiumoxide   = { version = "0.9", default-features = false }

          # CRDT
          yrs             = "0.21"

          # Misc utilities
          dunce           = "1"
          rustls          = "0.23"
          tokio-rustls    = "0.26"
          aho-corasick    = "1.1"
          nom             = "7"
          itertools       = "0.13"
          libc            = "0.2"
          strum           = "0.26"
          socket2         = "0.5"
          spki            = "0.7"
          spin            = "0.9"

          # Testing
          wiremock        = "0.6"

          [workspace.lints.clippy]
          unwrap_used = "warn"
          expect_used = "warn"
          panic = "warn"
          todo = "warn"
          dbg_macro = "warn"
          print_stdout = "warn"
          print_stderr = "warn"
          unnecessary_wraps = "warn"
          redundant_closure_for_method_calls = "warn"
          manual_let_else = "allow"
          too_many_arguments = "allow"
          manual_clamp = "allow"
          manual_strip = "allow"
          items_after_test_module = "allow"
          expect_fun_call = "allow"
          single_match = "allow"
          needless_borrows_for_generic_args = "allow"
          manual_abs_diff = "allow"
          CARGO_TOML
            echo "✓ Workspace Cargo.toml stub created at $PARENT_DIR/Cargo.toml"
          fi

          echo "✓ Shared crates ready:"
          ls "$CRATES_TARGET/"

      # ── Rust cache (keyed per Cargo.lock) ───────────────────────────────────
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      # ── Rust checks ─────────────────────────────────────────────────────────
      - name: cargo fmt
        working-directory: backend
        run: cargo fmt --check

      - name: cargo clippy
        working-directory: backend
        run: cargo clippy -- -D warnings

      - name: cargo test (compile only)
        working-directory: backend
        run: cargo test --no-run
        # Tests require a live PostgreSQL instance (SQLx compile-time checks).
        # We compile but don't run. Integration tests can be added as a
        # separate job with a postgres service container when needed.

  # ────────────────────────────────────────────────────────────────────────────
  # Optional: full workspace check (runs only when dispatched manually or
  # when the workspace root is somehow accessible — e.g. via act locally).
  # This job is skipped on regular push/PR to avoid false positives.
  # ────────────────────────────────────────────────────────────────────────────
  workspace-hint:
    name: Workspace Check Hint
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4
      - name: Remind about full workspace check
        run: |
          echo "For full workspace checks (all 13 crates), run locally:"
          echo "  cd JaskierWorkspace && ./ci/rust-workspace-check.sh"
          echo "  cd JaskierWorkspace && ./ci/frontend-check.sh"
          echo "Or via Make:"
          echo "  make check   # cargo check --workspace"
          echo "  make lint    # cargo clippy --workspace + turbo lint"
          echo "  make test    # cargo test --workspace + turbo test"
