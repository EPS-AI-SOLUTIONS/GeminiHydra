name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: biomejs/setup-biome@v2
      - name: Biome check
        run: biome check --diagnostic-level=error src/
      # tsc requires @jaskier/ui workspace package (parent Desktop workspace)
      # TypeScript is enforced locally via pre-commit hook (conditional tsc)

  backend:
    name: Backend Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend
      - run: cargo fmt --check
      - run: cargo clippy -- -D warnings
      - run: cargo test --no-run
