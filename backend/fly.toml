app = 'geminihydra-v15-backend'
primary_region = 'arn'

# Multi-region: arn (Stockholm, primary), fra (Frankfurt), waw (Warsaw)
# Additional regions added via: fly machine clone --region fra/waw

[build]
  dockerfile = "apps/GeminiHydra/backend/Dockerfile"
  build_context = "."

[deploy]
  strategy = "rolling"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"
      method = "GET"
      path = "/api/health"

[env]
  RUST_LOG = "info"
  RUST_LOG_FORMAT = "json"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
