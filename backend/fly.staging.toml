# GeminiHydra v15 — Staging deployment config
# Usage: fly deploy --config fly.staging.toml
#
# Secrets: fly secrets set DATABASE_URL=... --app geminihydra-v15-staging

app = 'geminihydra-v15-staging'
primary_region = 'arn'

[build]

[deploy]
  strategy = "rolling"

[http_service]
  internal_port = 8081
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [http_service.checks.health]
      interval = "30s"
      timeout = "5s"
      grace_period = "10s"
      method = "GET"
      path = "/api/health"

[env]
  RUST_LOG = "debug"
  RUST_LOG_FORMAT = "json"

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
